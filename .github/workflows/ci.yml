name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate (hassfest + HACS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest (manifest / brands / quality)
        uses: home-assistant/actions/hassfest@master
      - name: HACS (repository structure)
        uses: hacs/action@main
        with:
          category: integration

  quality:
    name: Quality (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned tooling
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check (mypy --strict, all modules)
        run: mypy
      - name: Pure-core tests + coverage
        run: pytest --cov=custom_components/poise --cov-fail-under=85

  integration:
    name: Glue integration (HA runtime, py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install HA test harness (pulls Home Assistant)
        run: pip install -r requirements-test.txt
      - name: Guard — integration suite actually collected tests (no silent skip)
        run: |
          # match the real run's options so async tests are actually collected
          N=$(pytest tests/integration -o asyncio_mode=auto --co 2>/dev/null \
                | grep -cE '::' || true)
          echo "integration tests collected: $N"
          if [ "$N" -eq 0 ]; then
            echo "::error::tests/integration collected 0 tests — HA import failed or the dir was skipped. Collection output:"
            pytest tests/integration -o asyncio_mode=auto --co || true
            exit 1
          fi
      - name: Glue integration tests + coverage gate (config flow, setup/unload, live tick)
        run: >-
          pytest tests/integration
          -o asyncio_mode=auto
          -o asyncio_default_fixture_loop_scope=function
          --cov --cov-config=tests/integration/coverage_glue.ini
          --cov-report=term-missing --cov-fail-under=95

  card:
    name: Card (build + verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # >=22.6 so `node --test` runs the .ts card tests (type stripping).
          # Node 20 silently discovered/ran ZERO card tests (review F21/F22).
          node-version: "22"
          cache: npm
          cache-dependency-path: card/package-lock.json
      - name: Install (reproducible — lockfile)
        run: npm ci --no-audit --no-fund
      - name: Type-check card (tsc --noEmit)
        run: node node_modules/typescript/bin/tsc --noEmit
      - name: Card unit tests (node --test)
        run: node --test
      - name: Build bundle
        run: node build.mjs
      - name: Assert bundle embeds package version
        run: |
          VER=$(node -p "require('./package.json').version")
          grep -q "poise-card $VER " ../custom_components/poise/frontend/poise-card.js \
            || { echo "::error::built bundle does not embed version $VER"; exit 1; }
      - name: Guard — card version equals the integration version
        run: |
          CARD=$(node -p "require('./package.json').version")
          MANIFEST=$(node -p "require('../custom_components/poise/manifest.json').version")
          CONST=$(grep -E '^VERSION:' ../custom_components/poise/const.py \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$CARD" != "$MANIFEST" ] || [ "$CARD" != "$CONST" ]; then
            echo "::error::version drift — card=$CARD manifest=$MANIFEST const=$CONST must match. The poise/card_version WS endpoint serves const.VERSION; any mismatch shows every card user a permanent 'reload' toast. Bump card/package.json + rebuild."
            exit 1
          fi
      - name: Guard — committed bundle matches a fresh build
        run: |
          git diff --exit-code -- ../custom_components/poise/frontend/poise-card.js \
            || { echo "::error::poise-card.js is stale — run 'node build.mjs' in card/ and commit the result"; exit 1; }

  # M7: a single required check that proves validate + quality + integration +
  # card all passed *in the same run* (the per-job gates are no longer decoupled).
  gate:
    name: All gates green
    needs: [validate, quality, integration, card]
    runs-on: ubuntu-latest
    steps:
      - run: echo "validate, quality (pure-core + coverage), integration (glue + coverage) and card all passed"
