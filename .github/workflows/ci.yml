name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install ruff mypy pytest pytest-cov
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check core (mypy --strict)
        run: mypy
      - name: Tests
        run: pytest --cov=custom_components/poise --cov-fail-under=85
