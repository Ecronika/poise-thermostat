[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "poise"
version = "0.1.0"
description = "Self-learning, norm-based thermostat for Home Assistant"
requires-python = ">=3.12"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["custom_components/poise"]
mypy_path = "."
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["homeassistant.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["custom_components.poise", "custom_components.poise.coordinator", "custom_components.poise.actuator", "custom_components.poise.storage"]
ignore_errors = true
